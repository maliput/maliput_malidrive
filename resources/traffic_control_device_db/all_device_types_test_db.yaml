# Traffic Control Device Database for TrafficControlDeviceBooksBuilder tests.
# Contains one entry of each device_type: TrafficLight, TrafficSign, RoadMarking, RoadObject.

odr_signal_types:
  # Traffic light: type "1000001", subtype "-1", country "OpenDRIVE"
  - odr_representation:
      type: "1000001"
      subtype: "-1"
      country: "OpenDRIVE"
      country_revision: null
      name: "*"
    properties:
      device_type: TrafficLight
      description: "Standard three-bulb vertical traffic light."

      bulbs:
        - id: "RedBulb"
          position_traffic_light: [0.0, 0.0, 0.4]
          orientation_traffic_light: [1.0, 0.0, 0.0, 0.0]
          color: "Red"
          type: "Round"
          states: ["Off", "On"]

        - id: "YellowBulb"
          position_traffic_light: [0.0, 0.0, 0.0]
          orientation_traffic_light: [1.0, 0.0, 0.0, 0.0]
          color: "Yellow"
          type: "Round"
          states: ["Off", "On"]

        - id: "GreenBulb"
          position_traffic_light: [0.0, 0.0, -0.4]
          orientation_traffic_light: [1.0, 0.0, 0.0, 0.0]
          color: "Green"
          type: "Round"
          states: ["Off", "On"]

      rule_states:
        - conditions:
            - bulb_id: "RedBulb"
              state: "On"
            - bulb_id: "YellowBulb"
              state: "Off"
            - bulb_id: "GreenBulb"
              state: "Off"
          value: "Stop"

        - conditions:
            - bulb_id: "RedBulb"
              state: "Off"
            - bulb_id: "YellowBulb"
              state: "Off"
            - bulb_id: "GreenBulb"
              state: "On"
          value: "Go"

  # Traffic sign: Stop sign type "206"
  - odr_representation:
      type: "206"
      subtype: "-1"
      country: "OpenDRIVE"
      country_revision: null
      name: "*"
    properties:
      device_type: TrafficSign
      device_semantics: Stop
      is_position_dynamic: true
      description: "Stop sign."
      bulbs: []
      rule_states:
        - conditions: []
          value: "StopThenGo"

odr_object_types:
  # Road marking: Crosswalk
  - odr_representation:
      type: crosswalk
    properties:
      device_type: RoadMarking
      device_semantics: Crosswalk
      description: "Crosswalk road marking."

  # Road object: barrier
  - odr_representation:
      type: barrier
      subtype: "*"
      name: "*"
    properties:
      device_type: RoadObject
      is_position_dynamic: true
      description: "Barrier road object."
